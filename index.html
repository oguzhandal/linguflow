<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LinguFlow V19 - Dynamic Titles</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Merriweather:ital,wght@0,400;0,700;1,400&display=swap"
        rel="stylesheet">
    <style>
        body {
            font-family: 'Merriweather', serif;
            background-color: #F5EEDC;
            overflow: hidden;
            height: 100vh;
        }

        .paper-texture {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 0.05;
            pointer-events: none;
            z-index: 50;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
        }

        .fade-mask {
            mask-image: linear-gradient(to bottom, transparent 0%, black 15%, black 85%, transparent 100%);
            -webkit-mask-image: linear-gradient(to bottom, transparent 0%, black 15%, black 85%, transparent 100%);
        }

        .word-hover:hover {
            background-color: rgba(26, 115, 232, 0.1);
            border-radius: 4px;
            color: #1a73e8;
        }

        [x-cloak] {
            display: none !important;
        }

        .has-note {
            background-color: rgba(254, 240, 138, 0.6);
            border-radius: 4px;
            padding: 0 4px;
            border-bottom: 2px solid #eab308;
        }

        .nav-btn {
            @apply text-[10px] font-black uppercase tracking-[0.2em] text-gray-500 px-6 py-2.5 rounded-full bg-white/40 border border-black/5 shadow-sm hover:bg-black hover:text-white transition-all active:scale-95 flex items-center gap-2;
        }

        .ui-element {
            user-select: none !important;
            -webkit-user-select: none;
        }

        .selection-menu {
            position: fixed;
            z-index: 500;
            transform: translate(-50%, -100%);
            filter: drop-shadow(0 10px 15px rgba(0, 0, 0, 0.1));
        }

        .loader-dots div {
            animation: bounce 0.6s infinite alternate;
        }

        @keyframes bounce {
            to {
                transform: translateY(-12px);
                opacity: 0.4;
            }
        }

        .list-scroll::-webkit-scrollbar {
            width: 4px;
        }

        .list-scroll::-webkit-scrollbar-thumb {
            background: rgba(0, 0, 0, 0.1);
            border-radius: 10px;
        }
    </style>
</head>

<body x-data="app()" x-init="init()" @mouseup="handleTextSelection" class="select-text">

    <div class="paper-texture"></div>

    <div x-show="selectionMenu.show" x-cloak
        class="selection-menu bg-white rounded-full px-5 py-2 flex items-center gap-3 border border-black/5 shadow-2xl"
        :style="`left: ${selectionMenu.x}px; top: ${selectionMenu.y}px;`" @mousedown.stop>
        <button @click="speak(selectionMenu.text)"
            class="p-2 hover:bg-blue-50 rounded-full transition-colors">🔊</button>
        <div class="w-[1px] h-4 bg-black/10"></div>
        <button @click="openNoteFromSelection()"
            class="p-2 hover:bg-blue-50 rounded-full transition-colors font-black text-[10px] uppercase tracking-widest text-blue-600">Not
            Ekle</button>
        <button @click="selectionMenu.show = false" class="ml-1 text-gray-300 hover:text-red-500">✕</button>
    </div>

    <div x-show="loading" class="fixed inset-0 z-[300] flex flex-col items-center justify-center bg-[#F5EEDC]" x-cloak>
        <div class="loader-dots flex space-x-2 mb-8 text-blue-600">
            <div class="w-4 h-4 bg-current rounded-full"></div>
            <div class="w-4 h-4 bg-current rounded-full"></div>
            <div class="w-4 h-4 bg-current rounded-full"></div>
        </div>
        <p class="text-[11px] font-black tracking-[0.5em] text-gray-500 uppercase animate-pulse" x-text="loadingStatus">
        </p>
    </div>

    <template x-if="!apiKey">
        <div class="h-screen w-full flex items-center justify-center p-6 bg-[#F5EEDC]">
            <div
                class="bg-white/40 p-12 rounded-3xl shadow-2xl border border-black/5 max-w-md w-full text-center backdrop-blur-md">
                <h2 class="text-3xl font-black mb-8 uppercase tracking-tighter text-gray-800">LinguFlow</h2>
                <input type="password" x-model="tempKey" placeholder="Gemini API Key"
                    class="w-full p-5 border border-black/10 rounded-2xl mb-4 bg-white/60 outline-none focus:ring-2 focus:ring-blue-500 shadow-inner">
                <button @click="saveApiKey"
                    class="w-full bg-gray-900 text-white p-5 rounded-2xl font-bold hover:bg-black transition-all">Sistemi
                    Başlat</button>
            </div>
        </div>
    </template>

    <template x-if="apiKey && view === 'categories'">
        <div class="h-screen w-full flex flex-col items-center p-8 ui-element overflow-hidden" x-cloak>
            <header class="w-full text-center mb-6 shrink-0">
                <h1 class="text-6xl font-black text-gray-900 mb-4 tracking-tighter italic">LinguFlow</h1>
                <div class="flex gap-4 justify-center">
                    <button @click="view = 'history'" class="nav-btn"><span>🕒</span> Geçmiş</button>
                    <button @click="view = 'vocabulary'" class="nav-btn !text-blue-600"><span>📒</span>
                        Kelimelerim</button>
                    <button @click="resetKey"
                        class="text-[9px] font-black uppercase tracking-widest text-gray-400 px-4">API Değiştir</button>
                </div>
            </header>

            <div class="grid grid-cols-3 grid-rows-3 gap-4 w-full max-w-5xl flex-1 pb-4">
                <template x-for="cat in categories" :key="cat.id">
                    <div @click="selectCategory(cat)"
                        class="group cursor-pointer bg-white/20 border border-black/5 p-4 rounded-[2rem] hover:bg-black hover:text-white transition-all text-center flex flex-col justify-center items-center">
                        <div class="text-4xl mb-2 group-hover:scale-110 transition-transform" x-text="cat.icon"></div>
                        <h3 class="text-xs font-black uppercase tracking-widest leading-none" x-text="cat.name"></h3>
                    </div>
                </template>
            </div>
        </div>
    </template>

    <template x-if="apiKey && view === 'library'">
        <div class="h-screen w-full flex flex-col items-center p-8 ui-element overflow-hidden" x-cloak>
            <nav class="w-full max-w-7xl flex justify-start mb-4 shrink-0">
                <button @click="view = 'categories'" class="nav-btn">← Kategoriler</button>
            </nav>

            <header class="w-full text-center mb-6 shrink-0">
                <h2 class="text-5xl font-black text-gray-900 mb-2 tracking-tighter" x-text="currentCategory.name"></h2>
            </header>

            <div class="grid grid-cols-5 grid-rows-2 gap-4 w-full max-w-7xl flex-1 pb-8">
                <template x-for="i in 10">
                    <div @click="loadOrCreateStory(i)"
                        class="cursor-pointer bg-white/30 border border-black/5 rounded-[2.5rem] hover:bg-white transition-all shadow-sm flex flex-col items-center justify-center text-center transform hover:-translate-y-2 group relative p-6">

                        <div class="absolute top-4 left-6 text-[8px] font-black text-blue-800 uppercase tracking-widest"
                            x-text="'STAGE ' + i"></div>

                        <button @click.stop="refreshStageTitle(i)"
                            class="absolute top-3 right-5 p-2 hover:bg-black/5 rounded-full text-gray-400 hover:text-blue-600 transition-all"
                            title="Konu Değiştir">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3"
                                    d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15">
                                </path>
                            </svg>
                        </button>

                        <div class="text-lg font-black text-gray-800 leading-tight mb-2 px-2 italic"
                            x-text="getStageTitle(i)"></div>

                        <div class="text-[8px] font-black uppercase"
                            :class="isStorySaved(i) ? 'text-green-600' : 'text-gray-300'"
                            x-text="isStorySaved(i) ? 'Kayıtlı Hikaye' : 'Yeni Oluştur'"></div>
                    </div>
                </template>
            </div>
        </div>
    </template>

    <template x-if="apiKey && view === 'vocabulary'">
        <div class="h-screen w-full flex flex-col items-center p-8 ui-element overflow-hidden" x-cloak>
            <nav class="w-full max-w-7xl flex justify-start mb-8 shrink-0">
                <button @click="view = 'categories'" class="nav-btn">← Ana Ekran</button>
            </nav>
            <h1 class="text-5xl font-black mb-8 tracking-tighter">My Vocabulary</h1>
            <div
                class="w-full max-w-4xl flex-1 overflow-y-auto list-scroll grid grid-cols-1 md:grid-cols-2 gap-6 pb-20 pr-4">
                <template x-for="(note, key) in notes" :key="key">
                    <div class="bg-white/40 border border-yellow-200 p-8 rounded-3xl h-fit">
                        <div class="flex justify-between items-start mb-4">
                            <h4 class="text-xl font-black text-gray-900" x-text="extractWordFromKey(key)"></h4>
                            <button @click="speak(extractWordFromKey(key))" class="text-xl">🔊</button>
                        </div>
                        <p class="text-gray-600 italic leading-relaxed text-lg" x-text="note"></p>
                    </div>
                </template>
            </div>
        </div>
    </template>

    <template x-if="apiKey && view === 'history'">
        <div class="h-screen w-full flex flex-col items-center p-8 ui-element overflow-hidden" x-cloak>
            <nav class="w-full max-w-7xl flex justify-start mb-8 shrink-0">
                <button @click="view = 'categories'" class="nav-btn">← Ana Ekran</button>
            </nav>
            <h1 class="text-5xl font-black mb-8 tracking-tighter text-center">Arşiv</h1>
            <div class="w-full max-w-3xl flex-1 overflow-y-auto list-scroll space-y-4 pb-20 pr-4">
                <template x-for="story in history.slice().reverse()" :key="story.id">
                    <div @click="loadFromHistory(story)"
                        class="bg-white/30 p-8 rounded-[2rem] border border-black/5 flex justify-between items-center cursor-pointer hover:bg-white/70 shadow-sm transition-all group">
                        <div class="text-left">
                            <div class="flex items-center gap-3 mb-1">
                                <span class="text-2xl" x-text="getCategoryIcon(story.category)"></span>
                                <h4 class="font-bold text-gray-800 text-lg" x-text="story.title"></h4>
                            </div>
                            <span class="text-[10px] font-black text-blue-600 uppercase tracking-widest block"
                                x-text="'Stage ' + story.stage"></span>
                        </div>
                        <span class="text-2xl opacity-20 group-hover:opacity-100">→</span>
                    </div>
                </template>
            </div>
        </div>
    </template>

    <template x-if="view === 'reader'">
        <div class="relative h-screen w-full overflow-hidden" x-cloak>
            <nav class="absolute top-0 left-0 w-full p-10 flex justify-between items-center z-[60] ui-element">
                <button @click="view = lastView; paused = true" class="nav-btn">← Geri</button>
                <div class="flex flex-col items-center">
                    <h4 class="text-xs font-black text-gray-800 uppercase tracking-[0.4em]" x-text="currentStory.title">
                    </h4>
                    <button @click="regenerateCurrentStory()"
                        class="text-[8px] font-black text-blue-600 uppercase mt-3 hover:bg-blue-600 hover:text-white px-4 py-1 rounded-full border border-blue-600 transition-all tracking-[0.2em]">♻️
                        Konu Değiştir</button>
                </div>
                <div class="w-24"></div>
            </nav>

            <div id="scroll-container" class="fade-mask w-full max-w-5xl mx-auto h-full flex flex-col pt-[50vh]">
                <div :style="`transform: translateY(-${scrollOffset}px)`" class="will-change-transform">
                    <template x-for="(item, index) in currentStory.segments" :key="index">
                        <div class="mb-64 text-center transition-all duration-700 px-10"
                            :class="isNearCenter(index) ? 'opacity-100 scale-105' : 'opacity-40 scale-95'"
                            :data-segment-index="index">
                            <div
                                class="flex flex-wrap justify-center gap-x-4 text-5xl font-bold text-gray-900 leading-tight mb-12 tracking-tight content-text">
                                <template x-for="word in item.en.split(' ')">
                                    <span @click="openNote(index, word)" class="word-hover cursor-pointer px-1.5 py-1"
                                        :class="hasNote(index, word) ? 'has-note' : ''" x-text="word"></span>
                                </template>
                            </div>
                            <div class="flex items-center justify-center gap-8 ui-element">
                                <p class="text-2xl text-gray-500/70 italic font-medium max-w-2xl" x-text="item.tr"></p>
                                <button @click="toggleSpeak(item.en)"
                                    class="p-4 bg-black/5 rounded-full hover:bg-blue-100 transition-colors text-2xl text-black">
                                    <span x-text="currentlySpeaking === item.en ? '⏹' : '🔊'"></span>
                                </button>
                            </div>
                        </div>
                    </template>
                    <div class="h-[100vh]"></div>
                </div>
            </div>

            <div
                class="fixed bottom-12 left-1/2 -translate-x-1/2 flex items-center gap-10 bg-white/40 backdrop-blur-3xl border border-black/5 px-12 py-6 rounded-full shadow-2xl z-[100] ui-element text-black">
                <button @click="paused = !paused" class="hover:scale-110 active:scale-90 transition-all">
                    <svg x-show="paused" class="w-12 h-12 fill-gray-900" viewBox="0 0 24 24">
                        <path d="M8 5v14l11-7z" />
                    </svg>
                    <svg x-show="!paused" class="w-12 h-12 fill-gray-900" viewBox="0 0 24 24">
                        <path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z" />
                    </svg>
                </button>
                <div class="h-8 w-[1px] bg-black/10"></div>
                <div class="flex bg-black/5 p-1 rounded-2xl gap-1 text-[10px]">
                    <template x-for="s in [0.5, 1, 1.5]" :key="s">
                        <button @click="speed = s" class="px-5 py-2 rounded-xl font-black transition-all"
                            :class="speed == s ? 'bg-black text-white shadow-md' : 'text-gray-500 hover:bg-white/50'"
                            x-text="s + 'x'"></button>
                    </template>
                </div>
            </div>
        </div>
    </template>

    <div x-show="showModal"
        class="fixed inset-0 z-[200] flex items-center justify-center p-6 bg-black/80 backdrop-blur-xl" x-cloak
        x-transition>
        <div @click.away="showModal = false; paused = false"
            class="bg-[#FDF6E3] p-10 rounded-[2.5rem] shadow-2xl w-full max-w-xl border border-white/20">
            <div class="flex justify-between items-center mb-6">
                <h3 class="text-2xl font-black uppercase tracking-tighter text-gray-900 line-clamp-2 pr-6"
                    x-text="selectedWord"></h3>
                <button @click="speak(selectedWord)" class="p-5 bg-blue-100 rounded-full shrink-0">🔊</button>
            </div>
            <textarea x-model="tempNote"
                class="w-full h-48 p-6 bg-white/50 border border-black/5 rounded-2xl outline-none text-xl leading-relaxed"
                placeholder="Notlarınız..."></textarea>
            <div class="flex justify-between mt-8">
                <button @click="deleteNote" x-show="tempNote"
                    class="text-red-500 font-bold uppercase text-[9px] tracking-widest px-4 py-2">Sil</button>
                <button @click="saveNote"
                    class="bg-black text-white px-12 py-4 rounded-xl font-bold uppercase tracking-widest text-xs shadow-xl active:scale-95">Kaydet</button>
            </div>
        </div>
    </div>

    <script>
        function app() {
            return {
                view: 'categories',
                apiKey: localStorage.getItem('linguflow_v19_key'),
                tempKey: '',
                loading: false,
                loadingStatus: '',
                scrollOffset: 0,
                paused: true,
                speed: 1,
                showModal: false,
                selectedId: null,
                selectedWord: '',
                tempNote: '',
                currentlySpeaking: null,
                currentCategory: null,
                currentStory: null,
                lastView: 'categories',
                selectionMenu: { show: false, x: 0, y: 0, text: '' },

                // DATA
                savedStories: JSON.parse(localStorage.getItem('linguflow_saved_v19') || '{}'),
                history: JSON.parse(localStorage.getItem('linguflow_history_v19') || '[]'),
                notes: JSON.parse(localStorage.getItem('linguflow_notes_v19') || '{}'),
                stageTitles: JSON.parse(localStorage.getItem('linguflow_titles_v19') || '{}'),

                categories: [
                    { id: 'classics', name: 'Klasikler', icon: '📚' },
                    { id: 'fantasy', name: 'Fantastik', icon: '🧙‍♂️' },
                    { id: 'horror', name: 'Korku', icon: '🧛‍♂️' },
                    { id: 'scifi', name: 'Bilim Kurgu', icon: '🚀' },
                    { id: 'mystery', name: 'Gizem', icon: '🕵️‍♂️' },
                    { id: 'history', name: 'Tarih', icon: '📜' },
                    { id: 'romance', name: 'Romantik', icon: '💖' },
                    { id: 'adventure', name: 'Macera', icon: '🧭' },
                    { id: 'philosophy', name: 'Felsefe', icon: '🧠' }
                ],

                classicsList: [
                    "The Little Prince", "Alice in Wonderland", "Sherlock Holmes",
                    "Moby Dick", "Great Expectations", "Pride and Prejudice",
                    "1984", "Dracula", "Frankenstein", "The Picture of Dorian Gray"
                ],

                init() {
                    window.speechSynthesis.getVoices();
                    this.animate();
                    window.speechSynthesis.onend = () => this.currentlySpeaking = null;
                },

                // BAŞLIK YÖNETİMİ
                getStageTitle(stage) {
                    const key = `${this.currentCategory.id}-${stage}`;
                    if (this.stageTitles[key]) return this.stageTitles[key];

                    // Varsayılan Başlıklar
                    if (this.currentCategory.id === 'classics') {
                        return this.classicsList[stage - 1];
                    }

                    // Diğerleri için placeholders (ya da AI'dan istenir)
                    return "Story Concept...";
                },

                async refreshStageTitle(stage) {
                    this.loading = true;
                    this.loadingStatus = "Yeni Konu Öneriliyor...";
                    const levels = ["A1", "A2", "B1", "B1", "B2", "B2", "C1", "C1", "C2", "C2"];

                    const prompt = `Suggest a very short (2-4 words) story title for a ${this.currentCategory.name} story at ${levels[stage - 1]} English level. Return ONLY the title. No quotes.`;

                    try {
                        const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-3-flash-preview:generateContent?key=${this.apiKey}`, {
                            method: 'POST', headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
                        });
                        const data = await response.json();
                        const newTitle = data.candidates[0].content.parts[0].text.trim();

                        const key = `${this.currentCategory.id}-${stage}`;
                        this.stageTitles[key] = newTitle;
                        localStorage.setItem('linguflow_titles_v19', JSON.stringify(this.stageTitles));
                    } catch (err) {
                        console.error(err);
                    } finally {
                        this.loading = false;
                    }
                },

                saveApiKey() {
                    const key = this.tempKey.trim();
                    if (key.startsWith('AIza')) { localStorage.setItem('linguflow_v19_key', key); this.apiKey = key; }
                },

                resetKey() { if (confirm("Sıfırlansın mı?")) { localStorage.clear(); location.reload(); } },
                selectCategory(cat) {
                    this.currentCategory = cat;
                    this.view = 'library';
                    this.lastView = 'categories';
                },

                getCategoryIcon(catId) { return this.categories.find(c => c.id === catId)?.icon || '📖'; },
                isStorySaved(stage) { return !!this.savedStories[`${this.currentCategory.id}-${stage}`]; },

                loadOrCreateStory(stage) {
                    const key = `${this.currentCategory.id}-${stage}`;
                    if (this.savedStories[key]) {
                        this.currentStory = this.savedStories[key];
                        this.view = 'reader'; this.lastView = 'library';
                        this.scrollOffset = 0; this.paused = false;
                    } else {
                        this.generateStory(stage);
                    }
                },

                async regenerateCurrentStory() {
                    if (confirm("Başlık aynı kalsın mı? Hayır derseniz yeni bir konu önerilecek.")) {
                        const stage = this.currentStory.stage;
                        delete this.savedStories[`${this.currentCategory.id}-${stage}`];
                        await this.generateStory(stage);
                    } else {
                        const stage = this.currentStory.stage;
                        await this.refreshStageTitle(stage);
                        delete this.savedStories[`${this.currentCategory.id}-${stage}`];
                        await this.generateStory(stage);
                    }
                },

                async generateStory(stage) {
                    this.loading = true;
                    const storyTitle = this.getStageTitle(stage);
                    this.loadingStatus = `"${storyTitle}" Yazılıyor...`;

                    const levels = ["A1", "A2", "B1", "B1", "B2", "B2", "C1", "C1", "C2", "C2"];
                    const prompt = `Write a short story in English at ${levels[stage - 1]} level specifically about the topic: "${storyTitle}". Length: 8-10 segments. Format: ONLY JSON array [{"en": "text", "tr": "text"}]. Natural Turkish translation.`;

                    try {
                        const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-3-flash-preview:generateContent?key=${this.apiKey}`, {
                            method: 'POST', headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
                        });
                        const data = await response.json();
                        let raw = data.candidates[0].content.parts[0].text.replace(/```json/g, "").replace(/```/g, "").trim();
                        const segments = JSON.parse(raw);
                        const story = { id: Date.now(), stage, category: this.currentCategory.id, title: storyTitle, segments, timestamp: Date.now() };

                        this.savedStories[`${this.currentCategory.id}-${stage}`] = story;
                        this.history.push(story);
                        localStorage.setItem('linguflow_saved_v19', JSON.stringify(this.savedStories));
                        localStorage.setItem('linguflow_history_v19', JSON.stringify(this.history));

                        this.currentStory = story; this.view = 'reader'; this.loading = false; this.scrollOffset = 0; this.paused = false;
                    } catch (err) { alert("Hata!"); this.loading = false; }
                },
                async speak(text) {
                    if (!this.apiKey) return;

                    // Eğer zaten bir şey okunuyorsa durdur
                    if (this.currentAudio) {
                        this.currentAudio.pause();
                        if (this.currentlySpeaking === text) {
                            this.currentlySpeaking = null;
                            return;
                        }
                    }

                    try {
                        // Mustafa, senin paylaştığın yapıya uygun Gemini TTS Endpoint'i:
                        const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-tts:synthesizeSpeech?key=${this.apiKey}`;

                        const response = await fetch(url, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({
                                input: { text: text },
                                voice: {
                                    languageCode: "en-US",
                                    name: "Achernar" // İstediğin o yumuşak ve akıcı ses karakteri
                                },
                                audioConfig: {
                                    audioEncoding: "MP3",
                                    speakingRate: 1.0,
                                    pitch: 0
                                }
                            })
                        });

                        const data = await response.json();

                        // Debug için konsola bakalım (QA refleksi)
                        console.log("Gemini TTS Response:", data);

                        if (data.audioContent) {
                            const audioSrc = `data:audio/mp3;base64,${data.audioContent}`;
                            this.currentAudio = new Audio(audioSrc);

                            this.currentAudio.onplay = () => { this.currentlySpeaking = text; };
                            this.currentAudio.onended = () => { this.currentlySpeaking = null; };

                            this.currentAudio.play();
                        } else {
                            // Eğer audioContent boşsa (API yetki hatası vb.) tarayıcı sesine dön
                            throw new Error("API'den ses verisi gelmedi.");
                        }
                    } catch (err) {
                        console.warn("Gemini TTS çalışmadı, tarayıcı sesine dönülüyor:", err);
                        this.fallbackSpeak(text);
                    }
                },

                // API çalışmazsa sessiz kalmamak için yedek ses fonksiyonu
                fallbackSpeak(text) {
                    window.speechSynthesis.cancel();
                    const utterance = new SpeechSynthesisUtterance(text);
                    const voices = window.speechSynthesis.getVoices();
                    const voice = voices.find(v => v.name === 'Google US English') || voices.find(v => v.lang.startsWith('en-US'));
                    if (voice) utterance.voice = voice;
                    utterance.rate = 1.0;
                    utterance.onstart = () => this.currentlySpeaking = text;
                    utterance.onend = () => this.currentlySpeaking = null;
                    window.speechSynthesis.speak(utterance);
                },

                toggleSpeak(text) {
                    if (this.currentlySpeaking === text) { window.speechSynthesis.cancel(); this.currentlySpeaking = null; }
                    else { this.speak(text); }
                },

                handleTextSelection(e) {
                    // GUARD: Eğer okuyucu modunda değilsek menüyü asla gösterme
                    if (this.view !== 'reader') return;

                    if (e.target.closest('.ui-element')) return;

                    const selection = window.getSelection();
                    const text = selection.toString().trim();

                    if (text && text.length > 0) {
                        const range = selection.getRangeAt(0);
                        const rect = range.getBoundingClientRect();
                        this.selectionMenu = {
                            show: true,
                            x: rect.left + rect.width / 2,
                            y: rect.top - 10,
                            text: text
                        };
                    } else if (!e.target.closest('.selection-menu')) {
                        this.selectionMenu.show = false;
                    }
                },

                openNoteFromSelection() {
                    this.paused = true;
                    this.selectedWord = this.selectionMenu.text;
                    const selection = window.getSelection();
                    const segmentEl = selection.anchorNode.parentElement.closest('[data-segment-index]');
                    this.selectedId = segmentEl ? segmentEl.getAttribute('data-segment-index') : 'global';
                    this.tempNote = this.notes[`n-${this.currentCategory.id}-${this.currentStory.stage}-${this.selectedId}-${this.selectedWord}`] || '';
                    this.showModal = true;
                    this.selectionMenu.show = false;
                    window.getSelection().removeAllRanges();
                },

                animate() {
                    if (!this.paused && this.view === 'reader' && !this.showModal) this.scrollOffset += parseFloat(this.speed) * 0.95;
                    requestAnimationFrame(() => this.animate());
                },

                isNearCenter(index) { return Math.abs((index * 500) - this.scrollOffset) < 250; },

                openNote(index, word = '') {
                    if (this.view !== 'reader') return;

                    this.paused = true;
                    this.selectedId = index;
                    this.selectedWord = word.replace(/[.,\/#!$%\^&\*;:{}=\-_`~()]/g, "");
                    const key = `n-${this.currentCategory.id}-${this.currentStory.stage}-${index}-${this.selectedWord}`;
                    this.tempNote = this.notes[key] || '';
                    this.showModal = true;
                    this.speak(this.selectedWord);
                },

                hasNote(index, word) {
                    const cleanWord = word.replace(/[.,\/#!$%\^&\*;:{}=\-_`~()]/g, "");
                    const key = `n-${this.currentCategory.id}-${this.currentStory.stage}-${index}-${cleanWord}`;
                    return !!this.notes[key];
                },

                extractWordFromKey(key) { return key.split('-').pop(); },

                saveNote() {
                    const key = `n-${this.currentCategory.id}-${this.currentStory.stage}-${this.selectedId}-${this.selectedWord}`;
                    if (this.tempNote.trim()) { this.notes[key] = this.tempNote; } else { delete this.notes[key]; }
                    localStorage.setItem('linguflow_notes_v19', JSON.stringify(this.notes));
                    this.showModal = false; this.paused = false;
                },

                deleteNote() {
                    const key = `n-${this.currentCategory.id}-${this.currentStory.stage}-${this.selectedId}-${this.selectedWord}`;
                    delete this.notes[key];
                    localStorage.setItem('linguflow_notes_v19', JSON.stringify(this.notes));
                    this.tempNote = ''; this.showModal = false; this.paused = false;
                }
            }
        }
    </script>
